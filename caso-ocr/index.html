<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superviseur OCR Pro - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <datalist id="listeCommunes">
    <option value="Aboumi">
    <option value="Akiéni">
    <option value="Akanda">
    <option value="Bakoumba">
    <option value="Bitam">
    <option value="Bongoville">
    <option value="Booué">
    <option value="Boumango">
    <option value="Fougamou">
    <option value="Franceville">
    <option value="Gamba">
    <option value="Kango">
    <option value="Koulamoutou">
    <option value="Lambaréné">
    <option value="Lastourville">
    <option value="Lebamba">
    <option value="Léconi">
    <option value="Libreville">
    <option value="Mabanda">
    <option value="Makokou">
    <option value="Malinga">
    <option value="Mayumba">
    <option value="Mbigou">
    <option value="Médouneu">
    <option value="Mékambo">
    <option value="Mimongo">
    <option value="Mitzic">
    <option value="Moabi">
    <option value="Moanda">
    <option value="Mouila">
    <option value="Mounana">
    <option value="Ndjolé">
    <option value="Ndende">
    <option value="Ndindi">
    <option value="Ngouoni">
    <option value="Ntoum">
    <option value="Okondja">
    <option value="Omboué">
    <option value="Ovan">
    <option value="Owendo">
    <option value="Oyem">
    <option value="Port gentil">
</datalist>

    <div id="vueTableau" class="p-8">
        <div class="max-w-7xl mx-auto">
            
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold">Gestion des Dossiers CASO</h1>
                <div class="flex items-center gap-4 bg-white p-2 px-4 rounded-lg border border-slate-200 shadow-sm">
                    <div>
                        <p id="userDisplay" class="text-sm font-bold"></p>
                        <p id="roleDisplay" class="text-xs text-slate-500"></p>
                    </div>
                    <button onclick="deconnexion()" class="text-xs bg-red-50 text-red-600 px-3 py-1 rounded hover:bg-red-100 font-bold transition">Déconnexion</button>
                </div>
            </div>
            
            <div id="statsBar" class="grid grid-cols-3 gap-4 mb-6">
                <div class="p-4 bg-white rounded-xl shadow-sm border border-slate-200 cursor-pointer hover:bg-slate-50" onclick="filtrerStatut('tous')">
                    <p class="text-xs text-slate-500 uppercase font-bold">Total</p>
                    <p id="statTotal" class="text-2xl font-bold">0</p>
                </div>
                <div class="p-4 bg-white rounded-xl shadow-sm border border-slate-200 cursor-pointer hover:bg-yellow-50" onclick="filtrerStatut('en_attente')">
                    <p class="text-xs text-yellow-600 uppercase font-bold">En attente</p>
                    <p id="statAttente" class="text-2xl font-bold text-yellow-600">0</p>
                </div>
                <div class="p-4 bg-white rounded-xl shadow-sm border border-slate-200 cursor-pointer hover:bg-green-50" onclick="filtrerStatut('valide')">
                    <p class="text-xs text-green-600 uppercase font-bold">Validés</p>
                    <p id="statValide" class="text-2xl font-bold text-green-600">0</p>
                </div>
            </div>

            <form id="uploadForm" class="mb-6 p-4 bg-white rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-sm font-bold uppercase mb-2">Charger de nouveaux documents</h2>
                <div class="flex items-center gap-4">
                    <input type="file" id="fileInput" name="files" multiple accept=".pdf, .jpg, .png" class="text-sm">
                    <button type="button" onclick="uploaderFichiers()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700">Envoyer vers l'OCR</button>
                </div>
                <div id="uploadStatus" class="mt-2 text-sm font-bold text-blue-600 italic"></div>
            </form>

            <div class="mb-6">
                <input type="text" id="searchInput" placeholder="Recherche rapide..." onkeyup="appliquerFiltres()" class="w-full p-4 border rounded-xl shadow-sm">
            </div>

            <div class="bg-white rounded-xl shadow overflow-x-auto">
                <table class="w-full text-left text-xs">
                    <thead class="bg-slate-100 uppercase text-xs">
                        <tr>
                            <th class="p-3 cursor-pointer hover:bg-slate-200" onclick="trierPar('num_caso')">N° Caso ↕</th>
                            <th class="p-3 cursor-pointer hover:bg-slate-200" onclick="trierPar('requerant')">Requérant ↕</th>
                            <th class="p-3 cursor-pointer hover:bg-slate-200" onclick="trierPar('commune')">Commune ↕</th>
                            <th class="p-3 cursor-pointer hover:bg-slate-200" onclick="trierPar('parcelle')">Parcelle ↕</th>
                            <th class="p-3 cursor-pointer hover:bg-slate-200" onclick="trierPar('section')">Section ↕</th>
                            <th class="p-3">DEBUT<br>D'AFFICHAGE</th>
                            <th class="p-3">FIN<br>D'AFFICHAGE</th>
                            <th class="p-3">Upload</th>
                            <th class="p-3">
                                <select onchange="filtrerStatut(this.value)" class="bg-transparent font-bold cursor-pointer outline-none">
                                    <option value="tous">STATUT ↕</option>
                                    <option value="en_attente">En attente</option>
                                    <option value="valide">Validés</option>
                                </select>
                            </th>
                            <th class="p-3">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="vueEdition" class="hidden grid grid-cols-2 gap-0 h-screen overflow-hidden">
        <iframe id="pdfViewer" class="w-full h-full border-r bg-slate-100"></iframe>
        <div class="p-8 bg-white overflow-y-auto">
            <h1 class="text-2xl font-bold mb-6">Correction & Validation</h1>
            <form id="validationForm" class="space-y-4">
                <input type="hidden" id="currentCasoId" name="caso_id">
                <input type="hidden" name="validateur" id="validateurInput">
                <div id="fieldsContainer"></div>
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700">Enregistrer</button>
                <button type="button" onclick="retourTableau()" class="w-full text-slate-500 py-2 hover:underline">Retour</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8000";
        const SUFFIXE_CASO = "/ANUTTC/DG/DC/SC";
        const champs = ["num_caso", "parcelle", "section", "commune", "requerant", "date_debut", "date_fin"];
        let tousLesDocs = [];
        let triAsc = true;

        function getToken() { return localStorage.getItem('token'); }

        function initUserSession() {
            const token = getToken();
            if (!token) { window.location.href = 'login.html'; return; }
            try {
                const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
                document.getElementById('userDisplay').innerText = payload.sub;
                document.getElementById('roleDisplay').innerText = payload.role || 'Utilisateur';
            } catch (e) { deconnexion(); }
        }

        function deconnexion() { localStorage.removeItem('token'); window.location.href = 'login.html'; }

        function formaterDateTime(isoString) {
            if (!isoString) return "N/A";
            const date = new Date(isoString);
            const d = String(date.getDate()).padStart(2, '0');
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const y = date.getFullYear();
            const hh = String(date.getHours()).padStart(2, '0');
            const mm = String(date.getMinutes()).padStart(2, '0');
            const ss = String(date.getSeconds()).padStart(2, '0');
            return `${d}/${m}/${y} ${hh}:${mm}:${ss}`;
        }

        async function chargerDonnees() {
            try {
                const res = await fetch(`${API_URL}/tous-les-documents/`, { headers: { 'Authorization': 'Bearer ' + getToken() }});
                tousLesDocs = await res.json();
                majStats();
                afficherTableau(tousLesDocs);
            } catch(e) { console.error(e); }
        }

        function majStats() {
            document.getElementById('statTotal').innerText = tousLesDocs.length;
            document.getElementById('statAttente').innerText = tousLesDocs.filter(d => d.statut === 'en_attente').length;
            document.getElementById('statValide').innerText = tousLesDocs.filter(d => d.statut === 'valide').length;
        }

        function afficherTableau(data) {
            document.getElementById('tableBody').innerHTML = data.map(doc => `
                <tr class="border-b hover:bg-slate-50">
                    <td class="p-3 font-bold">${doc.num_caso || ''}</td>
                    <td class="p-3">${doc.requerant || ''}</td>
                    <td class="p-3">${doc.commune || ''}</td>
                    <td class="p-3">${doc.parcelle || ''}</td>
                    <td class="p-3">${doc.section || ''}</td>
                    <td class="p-3">${doc.date_debut || ''}</td>
                    <td class="p-3">${doc.date_fin || ''}</td>
                    <td class="p-3 font-mono">${formaterDateTime(doc.created_at)}</td>
                    <td class="p-3"><span class="px-2 py-1 rounded text-[10px] ${doc.statut === 'valide' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'}">${doc.statut}</span></td>
                    <td class="p-3">${doc.statut === 'en_attente' ? `<button onclick="editerDoc(${doc.id})" class="text-blue-600 font-bold hover:underline">Corriger</button>` : '-'}</td>
                </tr>
            `).join('');
        }

        function trierPar(col) {
            triAsc = !triAsc;
            const data = [...tousLesDocs].sort((a, b) => {
                const valA = (a[col] || '').toLowerCase();
                const valB = (b[col] || '').toLowerCase();
                return triAsc ? valA.localeCompare(valB) : valB.localeCompare(valA);
            });
            afficherTableau(data);
        }

        function filtrerStatut(statut) {
            if (statut === 'tous') return afficherTableau(tousLesDocs);
            afficherTableau(tousLesDocs.filter(d => d.statut === statut));
        }

        function appliquerFiltres() {
            const texte = document.getElementById('searchInput').value.toLowerCase();
            const data = tousLesDocs.filter(d => Object.values(d).some(val => String(val).toLowerCase().includes(texte)));
            afficherTableau(data);
        }

        async function uploaderFichiers() {
            const fileInput = document.getElementById('fileInput');
            const statusDiv = document.getElementById('uploadStatus');
            if (fileInput.files.length === 0) return alert("Sélectionnez des fichiers.");
            const formData = new FormData();
            for (const file of fileInput.files) formData.append('files', file);
            statusDiv.innerHTML = `<span class="animate-pulse">Traitement OCR...</span>`;
            try {
                const res = await fetch(`${API_URL}/upload-multiple/`, { method: 'POST', headers: { 'Authorization': 'Bearer ' + getToken() }, body: formData });
                if (res.ok) { statusDiv.innerHTML = "Terminé. <span class='cursor-pointer underline' onclick='chargerDonnees()'>Rafraîchir</span>"; fileInput.value = ''; }
            } catch(e) { statusDiv.innerText = "Erreur."; }
        }

        function editerDoc(id) {
            const doc = tousLesDocs.find(d => d.id === id);
            document.getElementById('vueTableau').classList.add('hidden');
            document.getElementById('vueEdition').classList.remove('hidden');
            document.getElementById('pdfViewer').src = `${API_URL}/static/${doc.filename}`;
            document.getElementById('currentCasoId').value = doc.id;
            const token = getToken();
            const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
            document.getElementById('validateurInput').value = payload.sub;
            document.getElementById('fieldsContainer').innerHTML = champs.map(col => {
                if (col === 'num_caso') {
                    let val = (doc[col] || '').replace(SUFFIXE_CASO, '');
                    return `<div class="mb-3"><label class="block text-xs font-bold uppercase">N° CASO</label><div class="flex"><input type="text" id="inputNumCaso" value="${val}" class="w-1/3 p-2 border rounded-l"><input type="text" value="${SUFFIXE_CASO}" readonly class="w-2/3 p-2 border bg-slate-100 rounded-r text-slate-500"></div></div>`;
                }
                return `<div class="mb-3"><label class="block text-xs font-bold uppercase">${col.replace('_', ' ')}</label><input type="text" name="${col}" value="${doc[col] || ''}" class="w-full p-2 border rounded shadow-sm"></div>`;
            }).join('');
        }

        function retourTableau() {
            document.getElementById('vueTableau').classList.remove('hidden');
            document.getElementById('vueEdition').classList.add('hidden');
        }

        document.getElementById('validationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            formData.set('num_caso', document.getElementById('inputNumCaso').value + SUFFIXE_CASO);
            const res = await fetch(`${API_URL}/valider-document/${formData.get('caso_id')}`, { method: 'POST', headers: { 'Authorization': 'Bearer ' + getToken() }, body: formData });
            if (res.ok) { retourTableau(); await chargerDonnees(); } else alert("Erreur validation");
        });

        initUserSession();
        chargerDonnees();
    </script>
</body>
</html>
